<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberVerse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>

<body class="bg-[#0a0a0a] text-[#e0e0e0]">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 right-0 h-[70px] bg-[#1a1a1a] border-b border-[#2d2d2d] z-50">
    <div class="max-w-[1200px] mx-auto px-6 h-full flex items-center justify-between">
        <h1 class="text-xl font-mono text-[#00fff9]">CyberVerse</h1>

        <div class="space-x-6 font-mono text-sm">
            <a href="/" class="text-[#00fff9]">Home</a>
            <a href="/labs">Labs</a>
            <a href="/login">Login</a>
        </div>
    </div>
</nav>

<main class="pt-[80px] px-6">

<!-- HERO -->
<section class="max-w-[1000px] mx-auto text-center py-16">
    <h1 class="text-4xl font-mono mb-4">
        Master the Art of <span class="text-[#00fff9]">Cyber Security</span>
    </h1>

    <p class="text-[#8a8a8a] mb-6">
        Practice real-world hacking labs and security tools safely.
    </p>

    <button onclick="registerUser()"
        class="border border-[#00fff9] px-6 py-2 rounded text-[#00fff9] hover:bg-[#00fff9] hover:text-black">
        🚀 Start Learning
    </button>
</section>

<!-- TOOLS SECTION -->
<section class="max-w-[1000px] mx-auto mt-10">
    <h2 class="text-2xl font-mono text-[#00fff9] mb-6">🛠 Available Tools</h2>

    {% if tools %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            {% for tool in tools %}
                <div class="bg-[#1a1a1a] border border-[#2d2d2d] p-4 rounded">
                    <h3 class="text-[#00fff9] font-mono">{{ tool.name }}</h3>
                    <p class="text-[#8a8a8a] text-sm">{{ tool.desc }}</p>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-[#8a8a8a]">No tools added yet.</p>
    {% endif %}
</section>

</main>

<script src="/static/main.js"></script>

</body>
</html>
