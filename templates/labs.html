<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Labs - CyberVerse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>

<body class="bg-[#0a0a0a] text-[#e0e0e0] p-6">

<h1 class="text-3xl font-mono text-[#00fff9] mb-8">
    🧪 Cyber Security Labs (Safe Simulation)
</h1>

<!-- 🔴 SQL INJECTION LAB -->
<div class="bg-[#1a1a1a] border border-[#2d2d2d] p-6 rounded mb-8">

    <h2 class="text-xl font-mono text-[#00fff9] mb-4">
        💣 SQL Injection Lab
    </h2>

    <p class="text-[#8a8a8a] mb-4">
        Try bypassing login using SQL Injection.<br>
        Hint: <span class="text-[#00fff9]">' OR '1'='1</span>
    </p>

    <form method="POST" class="space-y-4">
        <input name="username" placeholder="Username"
            class="w-full p-2 bg-black border border-[#2d2d2d] rounded">

        <input name="password" placeholder="Password"
            class="w-full p-2 bg-black border border-[#2d2d2d] rounded">

        <button class="border border-[#00fff9] px-6 py-2 rounded text-[#00fff9] hover:bg-[#00fff9] hover:text-black">
            Login
        </button>
    </form>

    {% if result %}
    <p class="mt-4 text-yellow-400 font-mono">
        {{ result }}
    </p>
    {% endif %}

</div>

<!-- 🟡 PASSWORD CHECKER -->
<div class="bg-[#1a1a1a] border border-[#2d2d2d] p-6 rounded">

    <h2 class="text-xl font-mono text-[#00fff9] mb-4">
        🔐 Password Strength Checker
    </h2>

    <form method="POST" action="/check_password" class="space-y-4">
        <input name="pwd" placeholder="Enter Password"
            class="w-full p-2 bg-black border border-[#2d2d2d] rounded">

        <button class="border border-[#00fff9] px-6 py-2 rounded text-[#00fff9] hover:bg-[#00fff9] hover:text-black">
            Check Strength
        </button>
    </form>

    {% if strength %}
    <p class="mt-4 font-mono text-green-400">
        {{ strength }}
    </p>
    {% endif %}

</div>

</body>
</html>
