<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Labs - CyberVerse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>

<body class="bg-[#0a0a0a] text-[#e0e0e0] p-6">

<h1 class="text-3xl font-mono text-[#00fff9] mb-8">
    🧪 Cyber Security Labs (Safe Simulation)
</h1>

<!-- 🔴 SQL INJECTION LAB -->
<div class="bg-[#111] p-6 rounded border border-gray-800">

<h3 class="mono text-xl text-cyan-400 mb-4">💣 SQL Injection Lab</h3>

<p class="text-gray-400 mb-2">
Try bypassing login using SQL Injection.<br>
Hint: <span class="text-cyan-400">' OR '1'='1</span>
</p>

<input id="username" type="text" placeholder="Username" class="w-full mb-3 p-2 bg-black border border-gray-700 rounded">

<input id="password" type="text" placeholder="Password" class="w-full mb-3 p-2 bg-black border border-gray-700 rounded">

<button onclick="checkSQLi()" class="border border-cyan-400 px-4 py-2 text-cyan-400 rounded">
Login
</button>

<p id="result" class="mt-4 text-sm"></p>

</div>

<!-- 🟡 PASSWORD CHECKER -->
<div class="bg-[#111] p-6 rounded border border-gray-800 mt-8">

<h3 class="mono text-xl text-cyan-400 mb-4">🔐 Password Strength Checker</h3>

<input id="passwordInput" type="text" placeholder="Enter password"
class="w-full mb-3 p-2 bg-black border border-gray-700 rounded">

<button onclick="checkPassword()" 
class="border border-cyan-400 px-4 py-2 text-cyan-400 rounded">
Check Strength
</button>

<p id="strengthResult" class="mt-4 text-sm"></p>

</div>
<button onclick="completeLab()" class="bg-green-400 px-4 py-2 rounded">
Complete Lab
</button>

<script>
function completeLab(){
    addXP(50);
    alert("Lab Completed! +50 XP");
}




function checkSQLi() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let result = document.getElementById("result");

    if (username.includes("' OR '1'='1") || password.includes("' OR '1'='1")) {
        result.innerHTML = "✅ Injection Successful! XP +100";
        result.style.color = "lightgreen";

        // Add XP
        let xp = parseInt(localStorage.getItem("xp")) || 0;
        xp += 100;
        localStorage.setItem("xp", xp);
    } else {
        result.innerHTML = "❌ Login Failed";
        result.style.color = "red";
    }
}


function checkPassword(){

    let password = document.getElementById("passwordInput").value;
    let result = document.getElementById("strengthResult");

    let strength = 0;

    // CONDITIONS
    if(password.length >= 8) strength++;
    if(/[A-Z]/.test(password)) strength++;
    if(/[0-9]/.test(password)) strength++;
    if(/[^A-Za-z0-9]/.test(password)) strength++;

    // RESULT LOGIC
    if(strength <= 1){
        result.innerHTML = "❌ Weak Password";
        result.style.color = "red";
    }
    else if(strength == 2){
        result.innerHTML = "⚠️ Medium Password";
        result.style.color = "orange";
    }
    else{
        result.innerHTML = "✅ Strong Password! XP +50";
        result.style.color = "lightgreen";

        // ADD XP
        let xp = parseInt(localStorage.getItem("xp")) || 0;
        xp += 50;
        localStorage.setItem("xp", xp);
    }
}

</script>

</body>
</html>
