<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CyberVerse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>

<body class="bg-[#0a0a0a] text-[#e0e0e0] flex items-center justify-center h-screen">

<div class="bg-[#1a1a1a] p-8 rounded-lg border border-[#2d2d2d] w-full max-w-md">

    <h2 class="text-2xl font-mono text-[#00fff9] mb-6 text-center">
        Create Account
    </h2>

    <form onsubmit="registerUser(event)">

        <div>
            <label class="text-sm text-[#8a8a8a]">Username</label>
           <input id="username" required
                class="w-full mt-1 p-2 bg-[#0a0a0a] border border-[#2d2d2d] rounded text-white">
        </div>

        <div>
            <label class="text-sm text-[#8a8a8a]">Password</label>
            <input id="password" type="password" required
                class="w-full mt-1 p-2 bg-[#0a0a0a] border border-[#2d2d2d] rounded text-white">
        </div>

  <button type="submit"
class="w-full border border-cyan-400 py-2 rounded text-cyan-400 hover:bg-cyan-400 hover:text-black transition">
Register
</button>

    </form>

    <p class="text-sm text-center text-[#8a8a8a] mt-4">
        Already have an account?
        <a href="/login" class="text-[#00fff9]">Login</a>
    </p>

</div>

<script>

async function registerUser(event) {

    event.preventDefault();

    const username = document.getElementById("username").value.trim();

    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Enter all fields");
        return;
    }

    try {

        const res = await fetch("/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        const data = await res.json();

        if (res.ok) {

            alert("Registration Successful 🚀");

            window.location.href = "/login.html";

        } else {

            alert(data.msg);
        }

    } catch (err) {

        console.error(err);

        alert("Server Error ❌");
    }
}

</script>

</body>
</html>
