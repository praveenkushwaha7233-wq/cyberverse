<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CyberVerse</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.font-mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>

<body class="bg-[#0a0a0a] text-[#e0e0e0] flex items-center justify-center h-screen">

<div class="bg-[#1a1a1a] p-8 rounded-lg border border-[#2d2d2d] w-full max-w-md">

<h2 class="text-2xl font-mono text-[#00fff9] mb-6 text-center">
Login to CyberVerse
</h2>

<!-- ✅ REMOVE form submission -->
<form onsubmit="loginUser(event)" class="space-y-4">

    <div>
        <label class="text-sm text-[#8a8a8a]">Username</label>
        <input id="username" name="username" required
        class="w-full mt-1 p-2 bg-[#0a0a0a] border border-[#2d2d2d] rounded text-white">
    </div>

    <div>
        <label class="text-sm text-[#8a8a8a]">Password</label>
        <input id="password" type="password" name="password" required
        class="w-full mt-1 p-2 bg-[#0a0a0a] border border-[#2d2d2d] rounded text-white">
    </div>

    <button type="submit"
    class="w-full border border-cyan-400 py-2 rounded text-cyan-400 hover:bg-cyan-400 hover:text-black transition">
    Login
    </button>

</form>

<p class="text-sm text-center text-[#8a8a8a] mt-4">
Don't have an account?
<a href="register.html" class="text-[#00fff9]">Register</a>
</p>

</div>

<script>
function loginUser(event) {
    event.preventDefault(); // stop page reload

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    console.log("Clicked Login"); // DEBUG

    if (username === "admin" && password === "admin") {
        alert("Admin Login Successful 🚀");

        localStorage.setItem("isAdmin", "true");

        window.location.href = "admin/admin.html";
    } else {
        alert("Invalid Credentials ❌");
    }
}
</script>

</body>
</html>
