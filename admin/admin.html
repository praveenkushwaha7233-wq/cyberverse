<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberVerse Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.mono { font-family: 'JetBrains Mono', monospace; }

.glow { box-shadow: 0 0 15px rgba(0,255,249,0.2); }

.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(0,255,249,0.3);
}

.nav-btn.active {
    color: #22d3ee;
    border-left: 3px solid #22d3ee;
    padding-left: 8px;
}
</style>
</head>

<body class="bg-[#0a0a0a] text-gray-200">

<script>
// ✅ FIXED ROLE CHECK (NO LOOP, NO WRONG PATH)

if (localStorage.getItem("cv_admin") !== "true") {
    alert("Access Denied 🚫");
    window.location.href = "/login.html";
}
</script>

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-64 bg-[#111] border-r border-gray-800 p-6">

<h1 class="mono text-xl text-cyan-400 mb-8">CyberVerse Admin</h1>

<nav class="space-y-4 mono text-sm">
<button onclick="showAdminSection('dashboard', event)" class="nav-btn active w-full text-left">Dashboard</button>
<button onclick="showAdminSection('users', event)" class="nav-btn w-full text-left text-gray-400 hover:text-white">Users</button>
<button onclick="showAdminSection('labs', event)" class="nav-btn w-full text-left text-gray-400 hover:text-white">Labs</button>
<button onclick="showAdminSection('progress', event)" class="nav-btn w-full text-left text-gray-400 hover:text-white">Progress</button>
<a href="/index.html" class="block text-gray-400 hover:text-white">Back to Site</a>
</nav>

</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-y-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-10">
    <h2 class="mono text-3xl">Admin Dashboard</h2>

    <div class="flex items-center gap-4">
        <span id="adminUser" class="text-cyan-400 mono"></span>
        <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="admin-section">
<div class="grid md:grid-cols-4 gap-6 mb-10">

<div class="card bg-[#111] p-6 rounded border border-gray-800 glow">
<h3 class="text-gray-400 text-sm">Total Users</h3>
<p id="totalUsers" class="text-3xl mono text-cyan-400">0</p>
</div>

<div class="card bg-[#111] p-6 rounded border border-gray-800 glow">
<h3 class="text-gray-400 text-sm">Total XP</h3>
<p id="totalXP" class="text-3xl mono text-cyan-400">0</p>
</div>

<div class="card bg-[#111] p-6 rounded border border-gray-800 glow">
<h3 class="text-gray-400 text-sm">Active Labs</h3>
<p class="text-3xl mono text-cyan-400">12</p>
</div>

<div class="card bg-[#111] p-6 rounded border border-gray-800 glow">
<h3 class="text-gray-400 text-sm">Daily Activity</h3>
<p class="text-3xl mono text-cyan-400">87%</p>
</div>

</div>
</div>

<!-- USERS -->
<div id="users" class="admin-section hidden bg-[#111] p-6 rounded border border-gray-800 mb-10">
<h3 class="mono text-xl mb-4">User Management</h3>

<table class="w-full text-left text-sm">
<thead>
<tr class="text-gray-400 border-b border-gray-700">
<th class="py-2">User</th>
<th>XP</th>
<th>Level</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>
</div>

<!-- LABS -->
<div id="labs" class="admin-section hidden bg-[#111] p-6 rounded border border-gray-800 mb-10">
<h3 class="mono text-xl mb-4">Labs Management</h3>

<button onclick="addLab()" class="mb-4 bg-cyan-400 text-black px-3 py-2 rounded text-sm">
+ Add Lab
</button>

<div id="labList" class="space-y-3"></div>
</div>

<!-- PROGRESS -->
<div id="progress" class="admin-section hidden bg-[#111] p-6 rounded border border-gray-800">
<h3 class="mono text-xl mb-4">Platform Activity</h3>
</div>

</div>
</div>

<script>

// NAV
function showAdminSection(id, event) {
    document.querySelectorAll('.admin-section').forEach(sec => sec.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');

    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

// USERS
let users = JSON.parse(localStorage.getItem("cv_users")) || [
    { name: "Kabir", xp: 1500 },
    { name: "Sara", xp: 800 }
];

function getLevel(xp) {
    return Math.floor(xp / 500) + 1;
}

function renderUsers() {
    let table = document.getElementById("userTable");
    table.innerHTML = "";

    let totalXP = 0;

    users.forEach((user, i) => {
        totalXP += user.xp;

        table.innerHTML += `
        <tr class="border-b border-gray-800">
            <td class="py-3">${user.name}</td>
            <td>${user.xp}</td>
            <td>${getLevel(user.xp)}</td>
            <td>
                <button onclick="addXP(${i})" class="bg-cyan-400 text-black px-2 py-1 rounded text-xs">+XP</button>
                <button onclick="resetUser(${i})" class="bg-red-500 px-2 py-1 rounded text-xs">Reset</button>
            </td>
        </tr>`;
    });

    document.getElementById("totalUsers").innerText = users.length;
    document.getElementById("totalXP").innerText = totalXP;

    localStorage.setItem("cv_users", JSON.stringify(users));
}

function addXP(i) {
    users[i].xp += 100;
    renderUsers();
}

function resetUser(i) {
    users[i].xp = 0;
    renderUsers();
}

// LABS
let labs = JSON.parse(localStorage.getItem("cv_labs")) || [];

function addLab() {
    let lab = {
        title: "New Lab " + (labs.length + 1),
        xp: 100
    };
    labs.push(lab);
    localStorage.setItem("cv_labs", JSON.stringify(labs));
    renderLabs();
}

function renderLabs() {
    let list = document.getElementById("labList");
    list.innerHTML = "";

    labs.forEach(l => {
        list.innerHTML += `
        <div class="bg-[#0a0a0a] p-3 rounded flex justify-between">
            <span>${l.title}</span>
            <span class="text-cyan-400">${l.xp} XP</span>
        </div>`;
    });
}

// LOGOUT FIX
function logout() {
    localStorage.removeItem("cv_admin");
    localStorage.removeItem("cv_username");
    window.location.href = "/login.html";
}

// SHOW USERNAME
const username = localStorage.getItem("cv_username");
if (username) {
    document.getElementById("adminUser").innerText = "👨‍💻 " + username;
}

// INIT
renderUsers();
renderLabs();

</script>

</body>
</html>
