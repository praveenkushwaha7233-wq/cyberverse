<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberVerse Learning</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0a0a0a; color:white; }
.card:hover {
  transform: translateY(-5px);
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(0,255,249,0.3);
}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl mb-6">Learning Labs</h1>

<!-- LAB CONTAINER -->
<div id="labs" class="grid md:grid-cols-3 gap-6"></div>

<script>

// LOAD LABS FROM BACKEND
async function loadLabs(){
  try {
    const res = await fetch("http://localhost:5000/api/labs");
    const labs = await res.json();

    let container = document.getElementById("labs");
    container.innerHTML = "";

    labs.forEach(lab=>{
      container.innerHTML += `
        <div class="card bg-[#111] p-6 rounded border border-gray-800">
          <h2 class="text-xl text-cyan-400">${lab.title}</h2>
          <p class="text-gray-400 text-sm mb-3">${lab.description}</p>

          <p class="text-xs mb-2">Difficulty: ${lab.difficulty}</p>

          <button onclick="completeLab('${lab._id}', ${lab.xp})"
          class="bg-cyan-400 text-black px-4 py-2 rounded">
            Complete (+${lab.xp} XP)
          </button>
        </div>
      `;
    });

  } catch(err){
    console.error("Error loading labs:", err);
  }
}

// COMPLETE LAB
async function completeLab(labId, xp){

  let user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  await fetch("http://localhost:5000/api/progress/complete",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      userId: user._id,
      labId: labId,
      xp: xp
    })
  });

  alert("Lab Completed 🎉 +"+xp+" XP");
}

// INIT
loadLabs();

</script>

</body>
</html>
