<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CyberVerse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>

<body class="bg-[#0a0a0a] text-[#e0e0e0] p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">
    <h1 class="text-2xl font-mono text-[#00fff9]">
        👋 Welcome KABIR
    </h1>

    <a href="/logout"
        class="border border-red-500 text-red-500 px-4 py-2 rounded hover:bg-red-500 hover:text-black">
        Logout
    </a>
</div>

<!-- NAVIGATION -->
<div class="flex gap-4 mb-8">
    <a href="/tools"
        class="border border-[#00fff9] px-4 py-2 rounded text-[#00fff9] hover:bg-[#00fff9] hover:text-black">
        🛠 Tools
    </a>

    <a href="/labs"
        class="border border-yellow-400 px-4 py-2 rounded text-yellow-400 hover:bg-yellow-400 hover:text-black">
        🧪 Labs
    </a>

    <a href="/admin"
        class="border border-purple-400 px-4 py-2 rounded text-purple-400 hover:bg-purple-400 hover:text-black">
        ⚙ Admin
    </a>
</div>

<!-- INFO CARD -->
<div class="bg-[#1a1a1a] border border-[#2d2d2d] p-6 rounded">
    <h2 class="text-xl font-mono text-[#00fff9] mb-4">Your Profile</h2>

    <p><strong>Username:</strong>Kabir</p>
    <p><strong>Role:</strong> Student</p>

    <p class="text-[#8a8a8a] mt-4">
        Use the navigation above to explore tools, labs, and admin panel.
    </p>
</div>

</body>
</html>
